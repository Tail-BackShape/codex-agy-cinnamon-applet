<svg xmlns="http://www.w3.org/2000/svg" width="920" height="500" viewBox="0 0 920 500" role="img" aria-labelledby="title desc">
  <title id="title">Codex and Antigravity Usage applet preview</title>
  <desc id="desc">An illustrative Cinnamon panel and popup using sanitized fixture values.</desc>
  <defs>
    <linearGradient id="desktop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263238"/>
      <stop offset="1" stop-color="#102027"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="920" height="500" rx="12" fill="url(#desktop)"/>
  <rect x="0" y="0" width="920" height="42" rx="12" fill="#202428"/>
  <rect x="0" y="30" width="920" height="12" fill="#202428"/>
  <text x="32" y="27" fill="#e8eaed" font-family="sans-serif" font-size="16">Menu</text>
  <text x="696" y="27" fill="#f7f7f7" font-family="sans-serif" font-size="16" font-weight="600">C 59%  A 80%</text>
  <text x="855" y="27" fill="#e8eaed" font-family="sans-serif" font-size="14">12:34</text>

  <g filter="url(#shadow)">
    <rect x="420" y="58" width="470" height="410" rx="10" fill="#2b2f33" stroke="#4b5055"/>

    <text x="446" y="91" fill="#fff" font-family="sans-serif" font-size="18" font-weight="700">Codex</text>
    <text x="836" y="91" fill="#aeb5bb" font-family="sans-serif" font-size="13" text-anchor="end">oauth</text>
    <text x="446" y="116" fill="#d9dde1" font-family="sans-serif" font-size="14">59% used · 2 windows</text>

    <text x="446" y="145" fill="#f1f3f4" font-family="sans-serif" font-size="14">5 hour</text>
    <text x="852" y="145" fill="#f1f3f4" font-family="sans-serif" font-size="14" text-anchor="end">28% used</text>
    <rect x="446" y="157" width="406" height="8" rx="4" fill="#53585d"/>
    <rect x="446" y="157" width="114" height="8" rx="4" fill="#55b86a"/>
    <text x="446" y="184" fill="#aeb5bb" font-family="sans-serif" font-size="12">Resets in 3h 12m</text>

    <text x="446" y="213" fill="#f1f3f4" font-family="sans-serif" font-size="14">Weekly</text>
    <text x="852" y="213" fill="#f1f3f4" font-family="sans-serif" font-size="14" text-anchor="end">59% used</text>
    <rect x="446" y="225" width="406" height="8" rx="4" fill="#53585d"/>
    <rect x="446" y="225" width="240" height="8" rx="4" fill="#55b86a"/>
    <text x="446" y="252" fill="#aeb5bb" font-family="sans-serif" font-size="12">Resets Jul 20, 12:00</text>

    <line x1="442" y1="272" x2="868" y2="272" stroke="#4b5055"/>

    <text x="446" y="305" fill="#fff" font-family="sans-serif" font-size="18" font-weight="700">Antigravity</text>
    <text x="836" y="305" fill="#aeb5bb" font-family="sans-serif" font-size="13" text-anchor="end">cli</text>
    <text x="446" y="330" fill="#d9dde1" font-family="sans-serif" font-size="14">80% used · 3 windows</text>

    <text x="446" y="359" fill="#f1f3f4" font-family="sans-serif" font-size="14">Gemini Pro</text>
    <text x="852" y="359" fill="#f1f3f4" font-family="sans-serif" font-size="14" text-anchor="end">80% used</text>
    <rect x="446" y="371" width="406" height="8" rx="4" fill="#53585d"/>
    <rect x="446" y="371" width="325" height="8" rx="4" fill="#efb63e"/>

    <text x="446" y="407" fill="#f1f3f4" font-family="sans-serif" font-size="14">Gemini Flash</text>
    <text x="852" y="407" fill="#aeb5bb" font-family="sans-serif" font-size="14" text-anchor="end">Usage unknown</text>
    <rect x="446" y="419" width="406" height="8" rx="4" fill="#53585d"/>

    <text x="446" y="451" fill="#aeb5bb" font-family="sans-serif" font-size="12">Updated: 12:34:56</text>
    <text x="852" y="451" fill="#8ab4f8" font-family="sans-serif" font-size="13" text-anchor="end">Refresh now</text>
  </g>

  <text x="32" y="472" fill="#b6c2c9" font-family="sans-serif" font-size="13">Illustrative preview · sanitized fixture values · no account data</text>
</svg>
